<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘도 힘내세요!</title>
    <meta name="description" content="아름다운 디자인의 첫 번째 아이디어 웹페이지입니다.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">오늘도 힘내세요!</h1>
            <p class="subtitle">새로운 시작을 위한 작은 발걸음</p>
            <button class="next-button">다음 문장 보기</button>
        </div>
    </div>
    <script>
        const sentences = [
            "오늘도 힘내세요!",
            "오늘도 해냈어요!",
            "조금씩 나아지고 있어요.",
            "이대로 계속 가봅시다."
        ];
        const colors = [
            "#0071e3", // Blue
            "#ffcc00", // Yellow
            "#ff9500", // Orange
            "#34c759"  // Green
        ];
        let currentIndex = 0;

        const titleElement = document.querySelector('.title');
        const buttonElement = document.querySelector('.next-button');

        buttonElement.addEventListener('click', () => {
            // Apply fade out
            titleElement.style.opacity = 0;
            titleElement.style.transform = 'translateY(-10px)';

            setTimeout(() => {
                // Change text and apply fade in
                currentIndex = (currentIndex + 1) % sentences.length;
                titleElement.textContent = sentences[currentIndex];
                titleElement.style.opacity = 1;
                titleElement.style.transform = 'translateY(0)';
                
                // Change button color
                const nextColor = colors[currentIndex];
                buttonElement.style.background = nextColor;
                buttonElement.style.boxShadow = `0 4px 12px ${nextColor}44`;
            }, 400);
        });
    </script>
</body>
</html>
